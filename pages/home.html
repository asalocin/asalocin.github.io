<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nicolás Aguilar — Home</title>
  <link rel="stylesheet" href="../css/style_frame.css" type="text/css" />

  <style>
    /* Barra para el botón (evita floats y choques con líneas de arriba) */
    .lang-bar{
      display: flex;
      justify-content: flex-end;
      margin: 0 0 1rem;     /* espacio debajo del botón */
      padding-top: .25rem;  /* separa de lo que haya arriba */
    }
    .lang-toggle{
      appearance: none;
      padding: .45rem .8rem;
      border: 1px solid currentColor;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Botón de idioma en su propia “barra” -->
    <div class="lang-bar">
      <button id="langToggle" class="lang-toggle" type="button">Spanish</button>
    </div>

    <p class="kicker" data-i18n="kicker"></p>
    <h1 data-i18n="homeTitle"></h1>
    <p class="lede" data-i18n="lede"></p>

    <div class="two-col">
      <div class="main">
        <h2 data-i18n="aboutTitle"></h2>

        <p data-i18n-html="aboutP1"></p>

        <p data-i18n-html="aboutP2"></p>

        <h2 data-i18n="educationTitle"></h2>
        <p data-i18n-html="educationP"></p>

        <h2 data-i18n="interestsTitle"></h2>
        <ul>
          <li data-i18n-html="interestMath"></li>
          <li data-i18n-html="interestOther"></li>
        </ul>

        <h2 data-i18n="contactTitle"></h2>
        <p data-i18n-html="contactP"></p>
      </div>

      <aside class="side">
        <div class="card">
          <img class="portrait" src="../img/portrait_placeholder.png" data-i18n-alt="portraitAlt" alt="" />
          <p class="note" data-i18n-html="elsewhereNote"></p>
          <hr class="hr" />
          <p class="small" data-i18n-html="tip"></p>
        </div>
      </aside>
    </div>
  </div>

  <script>
    // Edita los textos aqui: cada clave aparece una sola vez por idioma.
    const i18n = {
      en: {
        _htmlLang: "en",
        _title: "Nicolás Aguilar — Home",
        toggleBtn: "Spanish",

        kicker: "This page is still under construction!",
        homeTitle: "Home",
        lede: "Hi! - I'm Nicolás, and this is my personal website.",

        aboutTitle: "About this site",
        aboutP1: `I'm a Mathematical Engineering student. Right now I'm mostly interested on understanding
          <b>Measure Theory</b>.`,
        aboutP2: `This website is my little place on the internet: a corner to keep track of projects and share what I'm working on.
          `,

        educationTitle: "Education",
        educationP: `Mathematical Engineering ≈ Math major with an engineering mention<br>
                  Universidad de Santiago de Chile (USACH), 2022–2028 (in progress).`,

        interestsTitle: "Current interests",
        interestMath: "<b>Math:</b> Measure theory, probability.",
        interestOther: "<b>Others:</b> Also interested on Music, Literature, cinema, among other things.",

        contactTitle: "Contact",
        contactP: `I'm always eager to meet new people. If you happen to be here and want to reach out, you can write me at:
                 <br>Uni email: <span class=\"small\">nicolas.aguilar.m@usach.cl</span>
                 <br>Personal: <span class=\"small\">nicolasal.aguilarm@gmail.com</span>`,

        elsewhereNote: `Elsewhere: (under construction)`,

        tip: `Tip: use the menu above to explore <b>Writings</b>, <b>Music</b>, <b>Miscellaneous</b> and the <b>Blog</b>.`,
        portraitAlt: "Portrait photo"
      },

      es: {
        _htmlLang: "es",
        _title: "Nicolás Aguilar — Inicio",
        toggleBtn: "English",

        kicker: "¡Esta página aún está bajo construcción!",
        homeTitle: "Inicio",
        lede: "¡Hola! Soy Nicolás, y este es mi sitio web personal.",

        aboutTitle: "Sobre este sitio:",
        aboutP1: `Soy estudiante de Ingeniería Matemática. Ahora mismo estoy principalmente interesado en entender
           <b>Teoría de la Medida</b>.`,
        aboutP2: `Este sitio web es mi pequeño lugar en internet: un rincón para llevar registro de proyectos y compartir en qué estoy trabajando.
          `,

        educationTitle: "Educación",
        educationP: `Ingeniería en Matemáticas<br>
                     Universidad de Santiago de Chile (USACH), 2022–2028 (en curso).`,

        interestsTitle: "Intereses actuales",
        interestMath: "<b>Matemáticas:</b> Teoría de la medida, probabilidad.",
        interestOther: "<b>Otros:</b> También me interesa la Música, la Literatura, el cine, entre otros.",

        contactTitle: "Contacto",
        contactP: `Me apasiona conocer gente que haga cosas interesantes. Si estás por aquí y quieres comunicarte conmigo, puedes escribirme a:
                   <br>Email universidad: <span class=\"small\">nicolas.aguilar.m@usach.cl</span>
                   <br>Personal: <span class=\"small\">nicolasal.aguilarm@gmail.com</span>`,

        elsewhereNote: `En otros lados: (en construcción)`,

        tip: `Consejo: usa el menú de arriba para explorar <b>Writings</b>, <b>Music</b>, <b>Miscellaneous</b> y el <b>Blog</b>.`,
        portraitAlt: "Foto de retrato"
      }
    };

    let currentLang = "en";

    function setLang(lang) {
      const t = i18n[lang];
      document.documentElement.lang = t._htmlLang;
      document.title = t._title;

      const btn = document.getElementById("langToggle");
      if (btn) btn.textContent = t.toggleBtn;

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = t[key] ?? el.textContent;
      });

      document.querySelectorAll("[data-i18n-html]").forEach(el => {
        const key = el.dataset.i18nHtml;
        el.innerHTML = t[key] ?? el.innerHTML;
      });

      document.querySelectorAll("[data-i18n-alt]").forEach(el => {
        const key = el.dataset.i18nAlt;
        el.setAttribute("alt", t[key] ?? el.getAttribute("alt"));
      });

      currentLang = lang;
    }

    document.getElementById("langToggle").addEventListener("click", () => {
      setLang(currentLang === "en" ? "es" : "en");
    });

    setLang("en");
  </script>
</body>
</html>
